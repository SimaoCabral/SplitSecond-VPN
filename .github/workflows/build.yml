name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Usar Python do sistema garante que _tkinter está correctamente ligado ao libtk8.6.so
      - name: Install Python + Tk
        run: |
          sudo apt-get update -q
          sudo apt-get install -y python3 python3-pip python3-venv python3-tk

      - name: Build
        run: bash build.sh

      - name: Mark executable
        run: chmod +x dist/splitsecond-vpn

      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/splitsecond-vpn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build
        run: build.bat

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist\splitsecond-vpn.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: artifacts/

      - name: Mark Linux binary executable
        run: chmod +x artifacts/splitsecond-vpn

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/splitsecond-vpn
            artifacts/splitsecond-vpn.exe
          generate_release_notes: true
          body: |
            ## Download

            | Sistema | Ficheiro | Notas |
            |---------|----------|-------|
            | Linux x86-64 | `splitsecond-vpn` | `chmod +x splitsecond-vpn && ./splitsecond-vpn` |
            | Windows 10/11 | `splitsecond-vpn.exe` | Executar como administrador |

            Consulta o [GUIAO.md](GUIAO.md) para instruções completas.
